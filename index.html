<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fuel Selection Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            text-align: center;
            padding: 50px;
        }
        h1 {
            margin-bottom: 30px;
        }
        select {
            padding: 10px;
            font-size: 16px;
            width: 260px;
            margin-bottom: 20px;
        }
        iframe {
            width: 90%;
            height: 650px;
            border: none;
            display: none;
            margin-top: 20px;
            border-radius: 10px;
            background: white;
        }
    </style>
</head>
<body>

    <h1>Select OMC</h1>

    <select onchange="loadForm(this.value)">
        <option value="">-- Select Company --</option>
        <option value="iocl">IOCL</option>
        <option value="bpcl">BPCL</option>
        <option value="hpcl">HPCL</option>
    </select>

    <iframe id="formFrame"></iframe>

    <script>
        function loadForm(company) {
            let frame = document.getElementById("formFrame");
            let url = "";

            if (company === "iocl") {
                url = "https://docs.google.com/forms/d/e/1FAIpQLSfMBJC40d_2iX64KsFC3cJRkr0lcqw8MpoocSMRqgmRAeItEQ/viewform?embedded=true";
            } 
            else if (company === "bpcl") {
                url = "https://docs.google.com/forms/d/e/1FAIpQLSdTCmDhRT8UH4iLxkQUSVICBtQOhQ88zAmzISiVlmVJlpUmDw/viewform?embedded=true";
            } 
            else if (company === "hpcl") {
                url = "https://docs.google.com/forms/d/e/1FAIpQLSfQtTrYJ8rOagyFIeCCWSGxtq12vg2yi72-4OhTs1I8WdiNsQ/viewform?embedded=true";
            } 
            else {
                frame.style.display = "none";
                return;
            }

            frame.src = url;
            frame.style.display = "block";
        }
    </script>

</body>
</html>
